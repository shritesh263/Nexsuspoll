name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-contract:
    name: Test Soroban Contract
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true
      
      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contract/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run contract tests
        working-directory: ./contract
        run: cargo test --verbose
      
      - name: Build contract
        working-directory: ./contract
        run: cargo build --target wasm32-unknown-unknown --release

  test-wasm-utils:
    name: Test WASM Utils
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true
      
      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            wasm_utils/target/
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run WASM utils tests
        working-directory: ./wasm_utils
        run: cargo test --verbose
      
      - name: Build WASM module
        working-directory: ./wasm_utils
        run: cargo build --target wasm32-unknown-unknown --release

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          override: true
      
      - name: Check formatting
        run: |
          cd contract && cargo fmt -- --check
          cd ../wasm_utils && cargo fmt -- --check
      
      - name: Run Clippy
        run: |
          cd contract && cargo clippy -- -D warnings
          cd ../wasm_utils && cargo clippy -- -D warnings

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [test-contract, test-wasm-utils]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Vercel (Preview)
        run: echo "Deploy preview to Vercel or Netlify here"
